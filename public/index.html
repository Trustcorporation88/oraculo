<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>O Oráculo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
<style>
  :root {
    --bg: #0E0D12; --panel: #16141C; --panel-soft: #1C1923; --line: #2B2735;
    --bone: #EDE8DC; --bone-dim: #A79F92; --gold: #C9A15A; --gold-soft: #8A6E3C; --ember: #C33B2E; --sage: #7A9B76;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--bone); font-family: 'Source Sans 3', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  .display { font-family: 'Marcellus', Georgia, serif; }
  button { font-family: inherit; }

  header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--line); }
  .eye { position: relative; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
  .eye .ring1 { position: absolute; inset: 0; border: 1px solid var(--gold-soft); border-radius: 50%; }
  .eye .ring2 { position: absolute; inset: 8px; border: 1px solid var(--line); border-radius: 50%; }
  .eye .core { width: 10px; height: 10px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 6px var(--gold-soft); transition: box-shadow .4s; }
  body.thinking .eye .ring1 { animation: pulse 1.6s ease-in-out infinite; }
  body.thinking .eye .core { box-shadow: 0 0 14px var(--gold); }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: .9 } 50% { transform: scale(1.18); opacity: .35 } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

  header h1 { font-size: 20px; letter-spacing: .08em; }
  header .sub { font-size: 12px; color: var(--bone-dim); }
  .hbtns { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .hbtn { font-size: 12px; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--line); background: none; color: var(--bone-dim); cursor: pointer; }
  .badge { display: inline-block; min-width: 16px; padding: 0 4px; margin-left: 5px; border-radius: 8px; background: var(--gold); color: #171308; font-size: 10px; font-weight: 600; text-align: center; }
  #db-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; background: var(--bone-dim); vertical-align: middle; }
  #db-dot.on { background: var(--sage); }

  main { flex: 1; overflow-y: auto; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 24px 16px; }
  .view { display: none; }
  .view.active { display: block; }

  .lead { font-size: 26px; color: var(--gold); line-height: 1.3; margin-bottom: 6px; }
  .desc { font-size: 14px; color: var(--bone-dim); margin-bottom: 20px; }

  .session { width: 100%; text-align: left; display: flex; align-items: center; gap: 12px; padding: 14px 16px; margin-bottom: 10px; border-radius: 8px; background: var(--panel-soft); border: 1px solid var(--line); color: var(--bone); cursor: pointer; }
  .session:hover { border-color: var(--gold-soft); }
  .session .t { font-size: 15px; }
  .session .m { font-size: 12px; color: var(--bone-dim); margin-top: 2px; }
  .session .del { margin-left: auto; background: none; border: none; color: var(--bone-dim); font-size: 16px; cursor: pointer; padding: 4px 8px; }
  .session .del:hover { color: var(--ember); }
  .btn-primary { width: 100%; padding: 13px; margin-top: 12px; font-size: 15px; letter-spacing: .14em; text-transform: uppercase; font-family: 'Marcellus', Georgia, serif; border: none; border-radius: 6px; background: var(--gold); color: #171308; cursor: pointer; }
  .btn-primary:disabled { background: var(--panel-soft); color: #5B5546; cursor: not-allowed; }
  .empty { font-size: 14px; color: var(--bone-dim); padding: 20px 0; font-style: italic; }

  .field { display: block; margin-bottom: 16px; }
  .field span { display: block; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--bone-dim); margin-bottom: 4px; }
  .field input, .field textarea, .field select { width: 100%; padding: 9px 12px; font-size: 14px; font-family: inherit; background: var(--panel-soft); border: 1px solid var(--line); border-radius: 6px; color: var(--bone); outline: none; resize: none; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--gold-soft); }
  ::placeholder { color: #6B6455; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .msg-user { display: flex; justify-content: flex-end; margin-bottom: 20px; }
  .msg-user .bubble { max-width: 85%; padding: 10px 16px; font-size: 14px; white-space: pre-wrap; background: var(--panel-soft); border: 1px solid var(--line); border-radius: 8px; }
  .msg-oracle { display: flex; gap: 12px; margin-bottom: 20px; }
  .msg-oracle .rule { width: 2px; flex-shrink: 0; background: linear-gradient(var(--gold), transparent); margin-top: 4px; }
  .msg-oracle .text { max-width: 92%; font-size: 15px; line-height: 1.6; overflow-wrap: break-word; }
  .text p, .text ul, .text ol, .text blockquote, .text pre { margin-bottom: 10px; }
  .text ul, .text ol { padding-left: 22px; }
  .text h1, .text h2, .text h3 { font-family: 'Marcellus', Georgia, serif; color: var(--gold); margin: 14px 0 8px; font-size: 17px; letter-spacing: .04em; }
  .text strong { color: var(--gold); font-weight: 600; }
  .text code { background: var(--panel-soft); border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; font-size: 13px; }
  .text pre { background: var(--panel-soft); border: 1px solid var(--line); border-radius: 6px; padding: 10px; overflow-x: auto; }
  .text pre code { border: none; padding: 0; }
  .text blockquote { border-left: 2px solid var(--gold-soft); padding-left: 12px; color: var(--bone-dim); }
  .cursor { display: inline-block; width: 8px; height: 15px; background: var(--gold); vertical-align: text-bottom; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0 } }
  #error { display: none; font-size: 14px; padding: 10px 16px; border: 1px solid var(--ember); border-radius: 6px; margin-bottom: 20px; }
  #error button { background: none; border: none; color: var(--gold); text-decoration: underline; cursor: pointer; font-size: 14px; }

  footer { border-top: 1px solid var(--line); display: none; }
  .cmds { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; }
  .cmds button { flex-shrink: 0; font-size: 12px; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--gold-soft); background: none; color: var(--gold); cursor: pointer; }
  .cmds button:disabled { opacity: .4; cursor: default; }
  .cmds button.util { border-color: var(--line); color: var(--bone-dim); }
  .cmds button.duel { border-color: var(--ember); color: #E06A5E; }
  .inputrow { display: flex; gap: 8px; }
  #input { flex: 1; padding: 11px 12px; font-size: 14px; font-family: inherit; background: var(--panel-soft); border: 1px solid var(--line); border-radius: 6px; color: var(--bone); outline: none; resize: none; }
  #input:focus { border-color: var(--gold-soft); }
  #btn-send { padding: 0 18px; font-size: 13px; letter-spacing: .14em; text-transform: uppercase; font-family: 'Marcellus', Georgia, serif; border: none; border-radius: 6px; background: var(--panel-soft); color: #5B5546; cursor: default; }
  #btn-send.ready { background: var(--gold); color: #171308; cursor: pointer; }

  /* Flashcards */
  #cards .deck-info { font-size: 13px; color: var(--bone-dim); margin-bottom: 16px; }
  .card { min-height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 28px 22px; border-radius: 10px; background: var(--panel-soft); border: 1px solid var(--gold-soft); cursor: pointer; }
  .card .side { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--bone-dim); margin-bottom: 12px; }
  .card .content { font-size: 17px; line-height: 1.5; }
  .card.back .content { color: var(--gold); }
  .grade { display: none; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 14px; }
  .grade button { padding: 12px; border-radius: 6px; border: 1px solid var(--line); background: var(--panel-soft); color: var(--bone); font-size: 14px; cursor: pointer; }
  .grade .g0:hover { border-color: var(--ember); } .grade .g1:hover { border-color: var(--gold-soft); } .grade .g2:hover { border-color: var(--sage); }
  .done { text-align: center; padding: 40px 0; }
  .done .big { font-size: 22px; color: var(--gold); margin-bottom: 8px; }
  .done p { font-size: 14px; color: var(--bone-dim); }

  /* ===== Modo Duelo ===== */
  #duel .hud { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 13px; color: var(--bone-dim); }
  #duel .hud .score { font-family: 'Marcellus', Georgia, serif; font-size: 20px; color: var(--gold); }
  #duel .hud .streak { color: #E06A5E; font-weight: 600; }
  .timerbar { height: 6px; border-radius: 3px; background: var(--panel-soft); overflow: hidden; margin-bottom: 20px; }
  .timerbar .fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--gold), var(--ember)); transition: width .1s linear; }
  .duel-q { font-size: 18px; line-height: 1.5; margin-bottom: 18px; font-family: 'Marcellus', Georgia, serif; }
  .opt { width: 100%; text-align: left; display: flex; gap: 10px; align-items: baseline; padding: 13px 16px; margin-bottom: 10px; border-radius: 8px; background: var(--panel-soft); border: 1px solid var(--line); color: var(--bone); font-size: 15px; cursor: pointer; }
  .opt:hover:not(:disabled) { border-color: var(--gold-soft); }
  .opt:disabled { cursor: default; opacity: .75; }
  .opt .letter { font-family: 'Marcellus', Georgia, serif; color: var(--gold); }
  .opt.right { border-color: var(--sage); background: rgba(122,155,118,.12); opacity: 1; }
  .opt.wrong { border-color: var(--ember); background: rgba(195,59,46,.12); opacity: 1; }
  .duel-why { display: none; font-size: 14px; color: var(--bone-dim); border-left: 2px solid var(--gold-soft); padding-left: 12px; margin: 6px 0 14px; }
  .duel-next { display: none; }
  .duel-center { text-align: center; padding: 30px 0; }
  .duel-center .title { font-size: 30px; color: var(--gold); margin-bottom: 6px; letter-spacing: .06em; }
  .duel-center .rank { font-size: 64px; line-height: 1; color: var(--gold); margin: 18px 0 4px; }
  .duel-center .sub2 { font-size: 14px; color: var(--bone-dim); margin-bottom: 20px; }
  .duel-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 0 0 20px; }
  .duel-stats div { background: var(--panel-soft); border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
  .duel-stats .n { font-family: 'Marcellus', Georgia, serif; font-size: 22px; color: var(--gold); }
  .duel-stats .l { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--bone-dim); }
  .duel-gaps { text-align: left; margin-bottom: 20px; }
  .duel-gaps h3 { font-family: 'Marcellus', Georgia, serif; font-size: 15px; color: var(--ember); margin-bottom: 10px; letter-spacing: .06em; }
  .duel-gaps .g { font-size: 14px; color: var(--bone-dim); border-left: 2px solid var(--ember); padding-left: 12px; margin-bottom: 12px; }
  .duel-gaps .g b { color: var(--bone); display: block; margin-bottom: 2px; font-weight: 600; }

  /* Impressão */
  #print-area { display: none; }
  @media print {
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area { display: block; position: absolute; top: 0; left: 0; width: 100%; background: #fff; color: #1a1a1a; font-family: Georgia, serif; padding: 40px; }
    #print-area h1 { font-size: 22px; margin-bottom: 4px; }
    #print-area .meta { font-size: 12px; color: #666; margin-bottom: 24px; }
    #print-area .p-msg { margin-bottom: 18px; page-break-inside: avoid; }
    #print-area .p-role { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: #8a6e3c; margin-bottom: 4px; }
    #print-area .p-body { font-size: 13px; line-height: 1.6; }
    #print-area .p-body h1, #print-area .p-body h2, #print-area .p-body h3 { font-size: 15px; margin: 10px 0 6px; }
    #print-area .p-body ul, #print-area .p-body ol { padding-left: 20px; margin-bottom: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="eye" id="btn-home" title="Início"><div class="ring1"></div><div class="ring2"></div><div class="core"></div></div>
  <div>
    <h1 class="display">O ORÁCULO</h1>
    <p class="sub"><span id="db-dot"></span><span id="subtitle">Cinco mentes. Um mentor.</span></p>
  </div>
  <div class="hbtns">
    <button class="hbtn" id="btn-review" style="display:none">Revisar<span class="badge" id="due-badge">0</span></button>
    <button class="hbtn" id="btn-pdf" style="display:none">Exportar PDF</button>
    <button class="hbtn" id="btn-back" style="display:none">← Voltar</button>
  </div>
</header>

<main>
  <div class="wrap view active" id="home">
    <p class="lead display">Seus Oráculos.</p>
    <p class="desc" id="home-desc">Cada tema tem seu próprio mentor, com memória da sessão e plano de domínio.</p>
    <div id="session-list"></div>
    <button class="btn-primary" id="btn-new">Novo Oráculo</button>
  </div>

  <div class="wrap view" id="setup">
    <p class="lead display">Diga o que quer dominar.</p>
    <p class="desc">O Oráculo revela o oculto, traça o caminho mais curto, ensina por perguntas e só libera avanço quando o domínio é real.</p>
    <label class="field"><span>Tema</span><input id="f-tema" placeholder="ex.: Tráfego pago no Instagram (Meta Ads)" /></label>
    <label class="field"><span>Por que quero dominar</span><textarea id="f-objetivo" rows="2" placeholder="ex.: rodar campanhas pros meus clientes sem queimar orçamento"></textarea></label>
    <div class="grid2">
      <label class="field"><span>Nível atual</span>
        <select id="f-nivel"><option>Iniciante</option><option>Intermediário</option><option>Avançado</option></select>
      </label>
      <label class="field"><span>Tempo por dia</span><input id="f-tempo" value="1 hora" /></label>
    </div>
    <div class="grid2">
      <label class="field"><span>Prazo</span><input id="f-prazo" value="6 semanas" /></label>
      <label class="field"><span>O que já sei (opcional)</span><input id="f-base" placeholder="ex.: já impulsionei posts" /></label>
    </div>
    <button class="btn-primary" id="btn-begin" disabled>Consultar o Oráculo</button>
  </div>

  <div class="wrap view" id="chat">
    <div id="messages"></div>
    <div id="error"><span id="error-text"></span> <button id="btn-retry">Tentar de novo</button></div>
    <div id="end"></div>
  </div>

  <div class="wrap view" id="cards">
    <p class="deck-info" id="deck-info"></p>
    <div id="card-stage"></div>
  </div>

  <div class="wrap view" id="duel">
    <div id="duel-stage"></div>
  </div>
</main>

<footer>
  <div class="wrap" style="padding: 8px 16px 12px;">
    <div class="cmds" id="cmds"></div>
    <div class="inputrow">
      <textarea id="input" rows="1" placeholder="Responda ao Oráculo…"></textarea>
      <button id="btn-send" class="display">Enviar</button>
    </div>
  </div>
</footer>

<div id="print-area"></div>

<script>
const $ = (id) => document.getElementById(id);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
marked.setOptions({ breaks: true, gfm: true });
const md = (raw) => DOMPurify.sanitize(marked.parse(raw || ""));

const COMMANDS = ["/revelar", "/plano", "/socratico", "/teste", "/gap", "/direto"];

const SYSTEM = (c) => `# IDENTIDADE

Você é O Oráculo: a fusão de cinco mentes em um único mentor.

1. O ESPECIALISTA — você opera como o maior especialista vivo em ${c.tema}. 30 anos estudando, aplicando e ensinando. Conhece os atalhos que os livros não ensinam, os erros que a maioria comete e as conexões que só ficam óbvias depois de anos de prática.
2. O REVELADOR — você expõe o conhecimento oculto da área: o que profissionais experientes sabem mas raramente ensinam porque parece óbvio demais para eles.
3. O ARQUITETO — você é designer de aprendizado. Elimina o irrelevante, prioriza o que tem maior impacto e cria sequências de prática que desenvolvem habilidade real, não apenas conhecimento teórico.
4. O SOCRÁTICO — você me faz descobrir respostas através de perguntas progressivas em vez de entregar conclusões prontas.
5. O AVALIADOR — você distingue conhecimento real de reconhecimento superficial e nunca me deixa confundir familiaridade com domínio.

Sua missão não é me dar respostas certas — é me fazer pensar como um especialista real pensa, e me levar de zero à competência real no menor caminho possível.

# CONTEXTO DO APRENDIZ

- Tema que quero dominar: ${c.tema}
- Por que quero dominar: ${c.objetivo}
- Meu nível atual: ${c.nivel}
- O que já sei sobre isso: ${c.base || "não informado"}
- Tempo disponível por dia: ${c.tempo}
- Prazo desejado: ${c.prazo}

# PROTOCOLO DE OPERAÇÃO

FASE 0 — DIAGNÓSTICO. Antes de qualquer coisa, faça até 3 perguntas para calibrar meu nível real e meu objetivo. Não confie apenas no que declarei — pessoas superestimam o próprio nível.

FASE 1 — REVELAÇÃO. Entregue o mapa oculto do tema: os 5 atalhos que quem domina esse tema usa no dia a dia mas raramente documenta; os 3 erros que a maioria comete porque aprendeu pela teoria sem prática real; a pergunta que ninguém faz sobre esse tema mas que muda tudo quando é respondida; o conceito contraintuitivo que parece errado mas separa quem é bom de quem é excelente.

FASE 2 — PLANO DE DOMÍNIO. Crie o caminho mais curto: os 3 conceitos que cobrem 80% das situações reais; a sequência correta de aprendizado para o meu objetivo específico; o exercício prático que posso fazer HOJE com o que já sei; o sinal objetivo que indica que dominei cada etapa antes de avançar.

FASE 3 — APRENDIZADO SOCRÁTICO. Ao ensinar cada conceito: comece com uma pergunta simples. Se acertei, aprofunde. Se errei parcialmente, faça a pergunta que me leva a descobrir o erro sozinho. Se errei completamente, recue para um conceito mais fundamental. Continue até eu explicar o conceito com minhas próprias palavras. Só então entregue o mapa completo do que aprendi.

FASE 4 — TESTE DE CONHECIMENTO REAL. Ao final de cada etapa, me teste em 3 níveis: NÍVEL 1 REPRODUÇÃO (explicar sem consultar nada); NÍVEL 2 APLICAÇÃO (problema real que exige o conceito — não um exemplo do material); NÍVEL 3 TRANSFERÊNCIA (conectar com uma área completamente diferente). Após cada nível, aponte exatamente onde meu entendimento está sólido e onde ainda é reconhecimento superficial disfarçado de compreensão. Só avanço para a próxima etapa se passar nos 3 níveis.

# COMANDOS

/revelar — expõe conhecimento oculto sobre o subtema atual
/plano — mostra ou atualiza o plano de domínio com progresso marcado
/socratico — ativa modo pergunta-guiada sobre o estudo atual
/teste — roda os 3 níveis de teste sobre o último conceito estudado
/gap — lista os gaps abertos que ainda preciso fechar
/direto — suspende o modo socrático e responde diretamente

# REGRAS INEGOCIÁVEIS

1. Se minha pergunta tiver uma premissa errada, corrija a premissa antes de responder. Especialista real não valida erro.
2. Nada que está nos primeiros resultados do Google. Se é fácil de encontrar, não é o que estou pedindo.
3. Nenhuma semana do plano pode ter mais conteúdo do que consigo aplicar no tempo informado. Conhecimento sem prática não conta como progresso.
4. No modo socrático, nunca entregue a resposta diretamente. Se eu pedir, responda com outra pergunta que me conduz até ela (exceto se eu usar /direto).
5. Elogio fácil não serve. Se minha resposta tiver gap, aponte o gap antes de qualquer validação.
6. Permaneça como O Oráculo durante toda a conversa.
7. Use markdown na formatação: títulos, negrito e listas quando ajudarem a clareza.
8. Responda sempre em português brasileiro, de forma direta e sem enrolação. Comece agora ativando a FASE 0.`;

/* ============ ARMAZENAMENTO: Postgres (nuvem) com fallback local ============ */
let useDb = false;

const localStore = {
  read(k, d) { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } },
  write(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
};

const Store = {
  async listSessions() {
    if (useDb) {
      const r = await fetch("/api/sessions").then((x) => x.json());
      return (r.sessions || []).map((s) => ({ id: s.id, ctx: s.ctx, duel_best: s.duel_best, updatedAt: Number(s.updated_at), msgCount: Number(s.msg_count) }));
    }
    return localStore.read("oraculo.sessions", []).map((s) => ({ ...s, msgCount: s.messages.length }));
  },
  async getSession(id) {
    if (useDb) {
      const r = await fetch(`/api/sessions/${id}`).then((x) => x.json());
      if (!r.session) return null;
      const s = r.session;
      return { id: s.id, ctx: s.ctx, messages: s.messages || [], duel_best: s.duel_best || 0, createdAt: Number(s.created_at), updatedAt: Number(s.updated_at) };
    }
    return localStore.read("oraculo.sessions", []).find((s) => s.id === id) || null;
  },
  async saveSession(s) {
    s.updatedAt = Date.now();
    if (useDb) {
      await fetch("/api/sessions", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: s.id, ctx: s.ctx, messages: s.messages, duel_best: s.duel_best || 0, created_at: s.createdAt, updated_at: s.updatedAt }),
      });
      return;
    }
    const all = localStore.read("oraculo.sessions", []).filter((x) => x.id !== s.id);
    all.unshift(s);
    localStore.write("oraculo.sessions", all);
  },
  async deleteSession(id) {
    if (useDb) { await fetch(`/api/sessions/${id}`, { method: "DELETE" }); return; }
    localStore.write("oraculo.sessions", localStore.read("oraculo.sessions", []).filter((x) => x.id !== id));
    localStore.write("oraculo.cards", localStore.read("oraculo.cards", []).filter((c) => c.sessionId !== id));
  },
  async listDueCards() {
    if (useDb) {
      const r = await fetch("/api/cards?due=1").then((x) => x.json());
      return (r.cards || []).map((c) => ({ ...c, sessionId: c.session_id, due: Number(c.due) }));
    }
    return localStore.read("oraculo.cards", []).filter((c) => c.due <= Date.now());
  },
  async addCards(cards) {
    if (useDb) {
      await fetch("/api/cards", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ cards }) });
      return;
    }
    localStore.write("oraculo.cards", [...localStore.read("oraculo.cards", []), ...cards]);
  },
  async updateCard(c) {
    if (useDb) {
      await fetch(`/api/cards/${c.id}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ due: c.due, ivl: c.ivl, ease: c.ease, reps: c.reps }) });
      return;
    }
    localStore.write("oraculo.cards", localStore.read("oraculo.cards", []).map((x) => (x.id === c.id ? c : x)));
  },
};

// Migra dados do navegador para o Postgres na primeira vez
async function migrateLocalToDb() {
  if (!useDb || localStore.read("oraculo.migrated", false)) return;
  const sessions = localStore.read("oraculo.sessions", []);
  const cards = localStore.read("oraculo.cards", []);
  try {
    for (const s of sessions) await Store.saveSession(s);
    if (cards.length) await Store.addCards(cards.map((c) => ({ ...c, ivl: c.ivl ?? c.interval ?? 0 })));
    localStore.write("oraculo.migrated", true);
  } catch {}
}

  const list = $("session-list");

    el.innerHTML = `<div><div class="t"></div><div class="m">${s.msgCount} mensagens · ${dt}${best}</div></div><button class="del" title="Apagar">×</button>`;
    el.querySelector(".t").textContent = s.ctx.tema;

function setLoading(v) {
  loading = v;
  document.body.classList.toggle("thinking", v);
  document.querySelectorAll(".cmds button").forEach((b) => (b.disabled = v));
  refreshSend();
}
function refreshSend() { $("btn-send").classList.toggle("ready", !loading && !!$("input").value.trim()); }
$("input").addEventListener("input", refreshSend);
$("input").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });

function msgEl(m) {
  const el = document.createElement("div");
  if (m.role === "user") {
    el.className = "msg-user";
    el.innerHTML = '<div class="bubble"></div>';
    el.querySelector(".bubble").textContent = m.content;
  } else {
    el.className = "msg-oracle";
    el.innerHTML = '<div class="rule"></div><div class="text"></div>';
    el.querySelector(".text").innerHTML = md(m.content);
  }
  return el;
}
function renderMessages() {
  const box = $("messages");
  box.innerHTML = "";
  current.messages.forEach((m) => box.appendChild(msgEl(m)));
  $("end").scrollIntoView();
}
function send(text) {
  const content = (text ?? $("input").value).trim();
  if (!content || loading || !current) return;
  $("input").value = "";
  refreshSend();
  current.messages.push({ role: "user", content });
  Store.saveSession(current).catch(() => {});
  $("messages").appendChild(msgEl(current.messages.at(-1)));
  $("end").scrollIntoView({ behavior: "smooth" });
  consult();
}

async function consult() {
  $("error").style.display = "none";
  setLoading(true);
  const live = document.createElement("div");
  live.className = "msg-oracle";
  live.innerHTML = '<div class="rule"></div><div class="text"><span class="cursor"></span></div>';
  $("messages").appendChild(live);
  const liveText = live.querySelector(".text");
  $("end").scrollIntoView({ behavior: "smooth" });

  let full = "";
  try {
    const r = await fetch("/api/oracle/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system: SYSTEM(current.ctx), messages: current.messages }),
    });
    if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.error || "erro"); }
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "", lastPaint = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data:")) continue;
        const payload = line.slice(5).trim();
        if (payload === "[DONE]") continue;
        try {
          const ev = JSON.parse(payload);
          if (ev.error) throw new Error(ev.error);
          if (ev.t) full += ev.t;
        } catch (e) { if (e instanceof SyntaxError) continue; throw e; }
      }
      const now = performance.now();
      if (now - lastPaint > 80) {
        liveText.innerHTML = md(full) + '<span class="cursor"></span>';
        $("end").scrollIntoView({ behavior: "smooth" });
        lastPaint = now;
      }
    }
    if (!full.trim()) throw new Error("vazio");
    liveText.innerHTML = md(full);
    current.messages.push({ role: "assistant", content: full });
    Store.saveSession(current).catch(() => {});
  } catch {
    live.remove();
    $("error-text").textContent = "O Oráculo não respondeu.";
    $("error").style.display = "block";
  } finally {
    setLoading(false);
    $("end").scrollIntoView({ behavior: "smooth" });
  }
}

async function refreshDueBadge() {
  try {
    const due = (await Store.listDueCards()).length;
    $("due-badge").textContent = due;
    $("btn-review").style.opacity = due ? 1 : 0.55;

async function generateCards() {
  if (!current || loading) return;
  const oracleMsgs = current.messages.filter((m) => m.role === "assistant");
  if (!oracleMsgs.length) return alert("Estude um pouco com o Oráculo antes de gerar flashcards.");
  setLoading(true);
  flashBtn.textContent = "🃏 Gerando…";
  try {
    const excerpt = oracleMsgs.slice(-4).map((m) => m.content).join("\n\n---\n\n");
    const r = await fetch("/api/flashcards", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tema: current.ctx.tema, excerpt }),
    });
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || "erro");
    const now = Date.now();
    await Store.addCards(d.cards.map((c) => ({ id: uid(), sessionId: current.id, q: c.q, a: c.a, due: now, ivl: 0, ease: 2.5, reps: 0 })));
    refreshDueBadge();
    alert(`${d.cards.length} flashcards criados. Toque em "Revisar" no topo para estudar.`);
  } catch {
    alert("Não foi possível gerar os flashcards. Tente novamente.");
  } finally {
    flashBtn.textContent = "🃏 Flashcards";
    setLoading(false);
  }
}

$("btn-review").addEventListener("click", async () => {
  reviewQueue = await Store.listDueCards();
  if (!reviewQueue.length) return alert("Nenhum cartão vencido agora. Volte mais tarde — a memória agradece o intervalo.");
  show("cards");
  nextCard();
});

function nextCard() {
  const stage = $("card-stage");
  $("deck-info").textContent = `${reviewQueue.length} cartão(ões) para revisar`;
  if (!reviewQueue.length) {
    stage.innerHTML = '<div class="done"><div class="big display">Revisão concluída.</div><p>O Oráculo reagendou cada cartão conforme sua resposta. Volte quando o próximo vencer.</p></div>';
    refreshDueBadge();
    return;
  }
  const card = reviewQueue[0];
  stage.innerHTML = `
    <div class="card" id="the-card">
      <div class="side">Pergunta — toque para revelar</div>
      <div class="content"></div>
    </div>
    <div class="grade" id="grade">
      <button class="g0">Errei</button>
      <button class="g1">Difícil</button>
      <button class="g2">Fácil</button>
    </div>`;
  stage.querySelector(".content").textContent = card.q;
  const el = $("the-card");
  el.addEventListener("click", () => {
    el.classList.add("back");
    el.querySelector(".side").textContent = "Resposta";
    el.querySelector(".content").textContent = card.a;
    $("grade").style.display = "grid";
  }, { once: true });
  stage.querySelector(".g0").addEventListener("click", () => grade(card, 0));
  stage.querySelector(".g1").addEventListener("click", () => grade(card, 1));
  stage.querySelector(".g2").addEventListener("click", () => grade(card, 2));
}

function grade(card, g) {
  const DAY = 86400000;
  if (g === 0) {
    card.reps = 0; card.ivl = 0;
    card.ease = Math.max(1.3, card.ease - 0.2);
    card.due = Date.now() + 10 * 60000;
  } else {
    card.reps += 1;
    if (card.reps === 1) card.ivl = 1;
    else if (card.reps === 2) card.ivl = g === 2 ? 4 : 2;
    else card.ivl = Math.round(card.ivl * (g === 2 ? card.ease : Math.max(1.2, card.ease - 0.35)));
    if (g === 2) card.ease = Math.min(3.0, card.ease + 0.05);
    card.due = Date.now() + card.ivl * DAY;
  }
  Store.updateCard(card).catch(() => {});
  reviewQueue.shift();
  nextCard();
}

/* ============ MODO DUELO ============ */
const DUEL_TIME = 20; // segundos por pergunta
let duel = null;

async function startDuel() {
  if (!current || loading) return;
  show("duel");
  $("duel-stage").innerHTML = '<div class="duel-center"><div class="title display">⚔️ MODO DUELO</div><p class="sub2">O Oráculo forja as 5 perguntas…</p></div>';
  document.body.classList.add("thinking");
  try {
    const oracleMsgs = current.messages.filter((m) => m.role === "assistant");
    const excerpt = oracleMsgs.slice(-4).map((m) => m.content).join("\n\n---\n\n");
    const r = await fetch("/api/duel", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tema: current.ctx.tema, nivel: current.ctx.nivel, excerpt }),
    });
    const d = await r.json();
    if (!r.ok || d.error || !d.questions?.length) throw new Error(d.error || "erro");
    duel = { questions: d.questions, i: 0, score: 0, streak: 0, hits: 0, best: 0, missed: [], timer: null, t: DUEL_TIME };
    duelQuestion();
  } catch {
    $("duel-stage").innerHTML = '<div class="duel-center"><div class="title display">⚔️</div><p class="sub2">O Oráculo não conseguiu forjar o duelo. Volte e tente novamente.</p></div>';
  } finally {
    document.body.classList.remove("thinking");
  }
}

function duelQuestion() {
  const q = duel.questions[duel.i];
  const letters = ["A", "B", "C", "D"];
  const mult = duel.streak >= 3 ? 2 : duel.streak === 2 ? 1.5 : 1;
  $("duel-stage").innerHTML = `
    <div class="hud">
      <span>Pergunta ${duel.i + 1}/${duel.questions.length}</span>
      <span class="streak">${duel.streak >= 2 ? `🔥 sequência x${mult}` : ""}</span>
      <span class="score">${duel.score}</span>
    </div>
    <div class="timerbar"><div class="fill" id="tfill"></div></div>
    <div class="duel-q"></div>
    <div id="opts"></div>
    <div class="duel-why" id="why"></div>
    <button class="btn-primary duel-next" id="next">Próxima</button>`;
  document.querySelector(".duel-q").textContent = q.q;
  const opts = $("opts");
  q.options.forEach((opt, idx) => {
    const b = document.createElement("button");
    b.className = "opt";
    b.innerHTML = `<span class="letter">${letters[idx]}</span><span class="otext"></span>`;
    b.querySelector(".otext").textContent = opt;
    b.addEventListener("click", () => answer(idx));
    opts.appendChild(b);
  });

  duel.t = DUEL_TIME;
  const fill = $("tfill");
  duel.timer = setInterval(() => {
    duel.t -= 0.1;
    fill.style.width = Math.max(0, (duel.t / DUEL_TIME) * 100) + "%";
    if (duel.t <= 0) answer(-1); // tempo esgotado
  }, 100);
}

function answer(idx) {
  clearInterval(duel.timer);
  const q = duel.questions[duel.i];
  const buttons = [...document.querySelectorAll(".opt")];
  buttons.forEach((b) => (b.disabled = true));
  buttons[q.correct]?.classList.add("right");

  const hit = idx === q.correct;
  if (hit) {
    duel.streak += 1;
    duel.hits += 1;
    const mult = duel.streak >= 3 ? 2 : duel.streak === 2 ? 1.5 : 1;
    duel.score += Math.round((100 + Math.max(0, duel.t) * 5) * mult);
  } else {
    if (idx >= 0) buttons[idx].classList.add("wrong");
    duel.streak = 0;
    duel.missed.push({ q: q.q, why: q.why, right: q.options[q.correct] });
  }
  document.querySelector(".hud .score").textContent = duel.score;

  const why = $("why");
  why.textContent = (hit ? "✓ " : idx === -1 ? "⏱ Tempo esgotado. " : "✗ ") + (q.why || "");
  why.style.display = "block";
  const next = $("next");
  next.textContent = duel.i + 1 < duel.questions.length ? "Próxima" : "Ver resultado";
  next.style.display = "block";
  next.addEventListener("click", () => {
    duel.i += 1;
    if (duel.i < duel.questions.length) duelQuestion();
    else duelEnd();
  }, { once: true });
}

function duelEnd() {
  const total = duel.questions.length;
  const pct = duel.hits / total;
  const rank = pct === 1 ? "S" : pct >= 0.8 ? "A" : pct >= 0.6 ? "B" : "C";
  const verdict = {
    S: "Domínio comprovado. O Oráculo se curva — por hoje.",
    A: "Forte. Mas o Oráculo viu o gap. Ele está listado abaixo.",
    B: "Reconhecimento superficial detectado. Os gaps abaixo são o seu próximo estudo.",
    C: "Familiaridade não é domínio. Volte ao Oráculo, feche os gaps e duele de novo.",
  }[rank];
  const isRecord = duel.score > (current.duel_best || 0);
  if (isRecord) {
    current.duel_best = duel.score;
    Store.saveSession(current).catch(() => {});
  }
  const gaps = duel.missed.map((m) =>
    `<div class="g"><b>${escapeHtml(m.q)}</b>Certo: ${escapeHtml(m.right)}. ${escapeHtml(m.why || "")}</div>`
  ).join("");
  $("duel-stage").innerHTML = `
    <div class="duel-center">
      <div class="title display">⚔️ FIM DO DUELO</div>
      <div class="rank display">${rank}</div>
      <p class="sub2">${verdict}</p>
      <div class="duel-stats">
        <div><div class="n">${duel.score}</div><div class="l">Pontos${isRecord ? " 🏆" : ""}</div></div>
        <div><div class="n">${duel.hits}/${total}</div><div class="l">Acertos</div></div>
        <div><div class="n">${current.duel_best || duel.score}</div><div class="l">Recorde</div></div>
      </div>
      ${gaps ? `<div class="duel-gaps"><h3>Gaps revelados</h3>${gaps}</div>` : ""}
      <button class="btn-primary" id="duel-again">Duelar de novo</button>
    </div>`;
  $("duel-again").addEventListener("click", startDuel);
}
